services:

  # ---- Base de datos ----
  db:
    image: postgis/postgis:16-3.4
    container_name: geotravel-db
    environment:
      POSTGRES_DB: geotravel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- GeoServer ----
  geoserver:
    image: kartoza/geoserver:2.25.2
    container_name: geotravel-geoserver
    environment:
      GEOSERVER_ADMIN_USER: admin
      GEOSERVER_ADMIN_PASSWORD: geoserver
    ports:
      - "8081:8080"
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
    depends_on:
      db:
        condition: service_healthy

  # ---- Backend (Tomcat + WAR) ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geotravel-backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  # ---- Frontend (React dev server) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: geotravel-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend

volumes:
  pgdata:
  geoserver_data:
